<svg
  xmlns="http://www.w3.org/2000/svg"
  width="260"
  height="64"
  viewBox="0 0 260 64"
  fill="none"
  role="img"
  aria-labelledby="title"
>
  <title id="title">LinkedIn Profile</title>
  <style>
    .button {
      fill: transparent;
      stroke: #d0cac0;
    }

    .label {
      fill: #5f5a55;
    }

    .mark {
      fill: #2e2b28;
    }

    .separator {
      stroke: #d0cac0;
    }

    @media (prefers-color-scheme: dark) {
      .button {
        stroke: #58524b;
      }

      .label {
        fill: #c9c3ba;
      }

      .mark {
        fill: #e7e2d8;
      }

      .separator {
        stroke: #58524b;
      }
    }
  </style>
  <rect class="button" x="1" y="1" width="258" height="62" rx="2" stroke-width="1.2" />
  <text
    class="mark"
    x="38"
    y="40"
    text-anchor="middle"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="24"
    font-weight="700"
  >
    in
  </text>
  <line class="separator" x1="66" y1="16" x2="66" y2="48" stroke="#d0cac0" stroke-width="1" />
  <text
    class="label"
    x="158"
    y="39"
    text-anchor="middle"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="22"
  >
    LinkedIn Profile
  </text>
</svg>
