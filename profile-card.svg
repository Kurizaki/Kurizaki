<svg
  xmlns="http://www.w3.org/2000/svg"
  width="900"
  height="916"
  viewBox="0 0 900 916"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Keanu Maleeq Koelewijn Software Engineer profile card</title>
  <desc id="desc">
    Tall centered profile card for Keanu Maleeq Koelewijn, Software Engineer working on Linux-based robotics software.
  </desc>

  <style>
    .strong {
      fill: #171717;
    }

    .heading {
      fill: #2e2b28;
    }

    .muted {
      fill: #5f5a55;
    }

    .line-strong {
      stroke: #aaa39a;
    }

    .line-soft {
      stroke: #d0cac0;
    }

    @keyframes wave {
      0% {
        transform: rotate(0deg);
      }

      10% {
        transform: rotate(14deg);
      }

      20% {
        transform: rotate(-8deg);
      }

      30% {
        transform: rotate(14deg);
      }

      40% {
        transform: rotate(-4deg);
      }

      50% {
        transform: rotate(10deg);
      }

      60%,
      100% {
        transform: rotate(0deg);
      }
    }

    .wave {
      animation: wave 1.5s linear -0.5s infinite;
      transform-box: fill-box;
      transform-origin: 70% 70%;
    }

    @media (prefers-color-scheme: dark) {
      .strong {
        fill: #f0f3f6;
      }

      .heading {
        fill: #e7e2d8;
      }

      .muted {
        fill: #c9c3ba;
      }

      .line-strong {
        stroke: #8f877c;
      }

      .line-soft {
        stroke: #58524b;
      }
    }

    @media (prefers-reduced-motion) {
      .wave {
        animation: none;
      }
    }

  </style>

  <text
    x="450"
    y="36"
    text-anchor="middle"
    class="muted"
    fill="#5f5a55"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="26"
    font-style="normal"
  >
    Welcome to my profile
  </text>

  <line class="line-soft" x1="260" y1="55" x2="640" y2="55" stroke="#d0cac0" stroke-width="1" />

  <text
    x="450"
    y="107"
    text-anchor="middle"
    class="strong"
    fill="#171717"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="45"
    font-weight="700"
    font-style="normal"
  >
    Keanu Maleeq Koelewijn
  </text>

  <text
    x="450"
    y="167"
    text-anchor="middle"
    class="muted"
    fill="#5f5a55"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="39"
    font-style="normal"
  >
    Software Engineer
  </text>

  <line class="line-soft" x1="172" y1="223" x2="728" y2="223" stroke="#d0cac0" stroke-width="1" />

  <text
    x="450"
    y="281"
    text-anchor="middle"
    class="heading"
    fill="#2e2b28"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="28"
    font-weight="700"
    font-style="normal"
  >
    Linux-based robotics software
  </text>

  <text
    x="450"
    y="325"
    text-anchor="middle"
    class="muted"
    fill="#5f5a55"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="23"
    font-style="normal"
  >
    <tspan x="450" dy="0">Working on Linux-based software development for robotics,</tspan>
    <tspan x="450" dy="33">mainly focused on autonomous robot systems.</tspan>
  </text>

  <text
    x="450"
    y="441"
    text-anchor="middle"
    class="muted"
    fill="#5f5a55"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="21"
    font-style="normal"
  >
    <tspan x="450" dy="0">Experience includes ROS2, Python backend development, C++/Qt RViz2 panels,</tspan>
    <tspan x="450" dy="30">user interfaces, Docker, Behaviour Trees, Blackboard-based state handling,</tspan>
    <tspan x="450" dy="30">and external API integrations.</tspan>
  </text>

  <line class="line-soft" x1="250" y1="549" x2="650" y2="549" stroke="#d0cac0" stroke-width="1" />

  <text
    x="450"
    y="589"
    text-anchor="middle"
    class="muted"
    fill="#5f5a55"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="21"
    font-style="normal"
  >
    <tspan x="450" dy="0">Currently helping give an autonomous assistance robot a voice by combining</tspan>
    <tspan x="450" dy="30">OpenAI Realtime conversations, sensor-aware context, function calling,</tspan>
    <tspan x="450" dy="30">and intent-based task execution through Behaviour Trees.</tspan>
  </text>

  <line class="line-soft" x1="250" y1="697" x2="650" y2="697" stroke="#d0cac0" stroke-width="1" />

  <text
    x="450"
    y="737"
    text-anchor="middle"
    class="muted"
    fill="#5f5a55"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="21"
    font-style="normal"
  >
    <tspan x="450" dy="0">Also researching custom hotword models using small, high-quality datasets,</tspan>
    <tspan x="450" dy="30">while improving prompt design, token efficiency, and reliable LLM behaviour.</tspan>
  </text>

  <text
    x="450"
    y="833"
    text-anchor="middle"
    class="muted"
    fill="#5f5a55"
    font-family="Times New Roman, Times, Georgia, serif"
    font-size="21"
    font-style="normal"
  >
    <tspan x="450" dy="0">Continuously learning through modern technologies, software architecture,</tspan>
    <tspan x="450" dy="30">and practical development strategies.</tspan>
  </text>

  <text
    class="wave"
    x="580"
    y="36"
    fill="#5f5a55"
    font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif"
    font-size="26"
  >
    👋
  </text>
</svg>
